<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🛠 Tools Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0c0f;
      --surface:  #131318;
      --surface2: #1c1c24;
      --border:   rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.14);
      --text:     #e4e4ed;
      --muted:    #5e5e72;
      --accent:   #7c6af7;
      --accent-h: #9580fa;
      --green:    #34d399;
      --blue:     #60a5fa;
      --orange:   #fb923c;
      --r:        12px;
      --r-sm:     8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* subtle grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    .shell { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Header ── */
    header { padding: 52px 0 36px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
    .header-left h1 { font-size: clamp(24px, 4vw, 36px); font-weight: 700; letter-spacing: -0.03em; background: linear-gradient(135deg, #fff 50%, rgba(255,255,255,0.4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-left p { color: var(--muted); font-size: 14px; margin-top: 5px; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 28px; }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    #search { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); font-family: inherit; font-size: 13.5px; padding: 9px 12px 9px 36px; outline: none; transition: border-color 0.2s; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 13px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; font-size: 12.5px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--border-h); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .btn-add { margin-left: auto; display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--r-sm); background: var(--accent); border: none; color: #fff; font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
    .btn-add:hover { background: var(--accent-h); }

    /* ── Cards ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 14px; }
    @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px 22px; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
    .card:hover { border-color: var(--border-h); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,0,0,0.35); }

    .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .card-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
    .card-meta { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
    .card-badges { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    .badge-script  { background: rgba(124,106,247,0.15); color: #a78bfa; }
    .badge-webapp  { background: rgba(96,165,250,0.15);  color: var(--blue); }
    .badge-cli     { background: rgba(52,211,153,0.15);  color: var(--green); }
    .badge-api     { background: rgba(251,146,60,0.15);  color: var(--orange); }
    .badge-other   { background: rgba(255,255,255,0.07); color: var(--muted); }

    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* code / link */
    .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 11px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #a5b4fc; overflow-x: auto; white-space: pre; line-height: 1.65; max-height: 120px; }
    .code-block .c { color: var(--muted); }

    .link-block { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 14px; }
    .link-block a { color: var(--blue); font-size: 13px; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .link-block a:hover { text-decoration: underline; }

    .card-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
    .btn-sm { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: var(--r-sm); font-family: inherit; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-copy { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-copy:hover { color: var(--text); border-color: var(--border-h); }
    .btn-copy.copied { background: rgba(52,211,153,0.15); color: var(--green); border-color: rgba(52,211,153,0.3); }
    .btn-delete { margin-left: auto; background: transparent; color: var(--muted); border: 1px solid transparent; font-size: 12px; padding: 6px 10px; }
    .btn-delete:hover { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.07); }
    .btn-edit { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-edit:hover { color: var(--text); border-color: var(--border-h); }

    /* ── Empty ── */
    #empty { display: none; text-align: center; padding: 80px 20px; color: var(--muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-h);
      border-radius: 16px;
      width: 100%; max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 30px;
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
    .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 16px; width: 30px; height: 30px; border-radius: var(--r-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .modal-close:hover { color: var(--text); }

    /* Form */
    .form-row { margin-bottom: 18px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm);
      color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 13px; outline: none;
      transition: border-color 0.2s; resize: vertical;
    }
    .form-row textarea { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; min-height: 110px; line-height: 1.6; }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row select option { background: #1c1c24; }

    .type-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .type-opt { display: none; }
    .type-label {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 12px 8px; border-radius: var(--r-sm); border: 1px solid var(--border);
      cursor: pointer; font-size: 12px; color: var(--muted); text-align: center; transition: all 0.15s;
    }
    .type-label span:first-child { font-size: 20px; }
    .type-opt:checked + .type-label { border-color: var(--accent); color: var(--accent-h); background: rgba(124,106,247,0.1); }

    /* conditional fields */
    .field-url, .field-code, .field-filepath { display: none; }

    .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-family: inherit; font-size: 14px; padding: 9px 18px; border-radius: var(--r-sm); cursor: pointer; }
    .btn-cancel:hover { color: var(--text); }
    .btn-save { background: var(--accent); border: none; color: #fff; font-family: inherit; font-size: 14px; font-weight: 600; padding: 9px 22px; border-radius: var(--r-sm); cursor: pointer; transition: background 0.15s; }
    .btn-save:hover { background: var(--accent-h); }

    /* footer */
    footer { text-align: center; padding: 40px 0 0; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 60px; }
  </style>
</head>
<body>

<div class="shell">

  <header>
    <div class="header-left">
      <h1>🛠 Tools Hub</h1>
      <p>Your mini tools, scripts, and links — all in one place.</p>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search tools…" autocomplete="off" />
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="script">Scripts</button>
      <button class="filter-btn" data-filter="webapp">Web Apps</button>
      <button class="filter-btn" data-filter="cli">CLI</button>
      <button class="filter-btn" data-filter="api">API</button>
      <button class="filter-btn" data-filter="other">Other</button>
    </div>
    <button class="btn-add" id="open-modal">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add tool
    </button>
  </div>

  <div class="cards" id="cards-grid"></div>
  <div id="empty">
    <div style="font-size:36px;margin-bottom:8px;">🔍</div>
    <p>No tools match your search.</p>
  </div>

  <footer>Tools Hub &middot; Data saved locally in your browser</footer>
</div>

<!-- ── Add / Edit Modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add a tool</div>
      <button class="modal-close" id="close-modal">✕</button>
    </div>

    <form id="tool-form" autocomplete="off">

      <div class="form-row">
        <label>Name</label>
        <input id="f-name" type="text" placeholder="e.g. WebP Converter, My Dashboard…" required />
      </div>

      <div class="form-row">
        <label>Type</label>
        <div class="type-grid">
          <input type="radio" name="type" value="script"  id="t-script"  class="type-opt" checked />
          <label class="type-label" for="t-script"><span>📄</span>Script</label>

          <input type="radio" name="type" value="webapp"  id="t-webapp"  class="type-opt" />
          <label class="type-label" for="t-webapp"><span>🌐</span>Web App</label>

          <input type="radio" name="type" value="cli"     id="t-cli"     class="type-opt" />
          <label class="type-label" for="t-cli"><span>⌨️</span>CLI</label>

          <input type="radio" name="type" value="api"     id="t-api"     class="type-opt" />
          <label class="type-label" for="t-api"><span>🔌</span>API</label>

          <input type="radio" name="type" value="other"   id="t-other"   class="type-opt" />
          <label class="type-label" for="t-other"><span>📦</span>Other</label>
        </div>
      </div>

      <div class="form-row">
        <label>Description <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input id="f-desc" type="text" placeholder="What does this tool do?" />
      </div>

      <div class="form-row">
        <label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0">(comma-separated)</span></label>
        <input id="f-tags" type="text" placeholder="Python, Images, Compression…" />
      </div>

      <!-- URL field (web apps, APIs) -->
      <div class="form-row field-url" id="field-url">
        <label>URL / Link</label>
        <input id="f-url" type="url" placeholder="https://…" />
      </div>

      <!-- File path (scripts, CLI) -->
      <div class="form-row field-filepath" id="field-filepath">
        <label>File path <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input id="f-filepath" type="text" placeholder="/path/to/script.py" />
        <p class="form-hint">The full path to the file on your machine.</p>
      </div>

      <!-- Code snippet (scripts, CLI) -->
      <div class="form-row field-code" id="field-code">
        <label>Commands / Code snippet <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <textarea id="f-code" placeholder="# How to run it&#10;python3 script.py --dir ./images"></textarea>
        <p class="form-hint">Paste the key commands you want to remember. Will be shown with a copy button.</p>
      </div>

    </form>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-modal">Cancel</button>
      <button class="btn-save" id="save-tool">Save tool</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const STORAGE_KEY = 'tools-hub-v1';

const defaultTools = [
  {
    id: 'default-webp',
    name: 'WebP Image Converter',
    type: 'script',
    desc: 'Batch-converts JPG & PNG to WebP. ~95% file size reduction. Supports dry-run, lossless, delete-originals.',
    tags: ['Python', 'Images', 'Compression'],
    url: '',
    filepath: '/Users/alitahir/Documents/Programming Projects/Claude Code/glowve Website/convert_to_webp.py',
    code: `# Convert all images in a folder\npython3 convert_to_webp.py --dir "path/to/images"\n\n# Dry-run (preview only)\npython3 convert_to_webp.py --dry-run\n\n# Lossless (logos/icons)\npython3 convert_to_webp.py --lossless --skip-jpg`,
    icon: '🖼'
  }
];

function loadTools() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved) && saved.length) return saved;
  } catch(e) {}
  return [...defaultTools];
}

function saveTools(tools) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tools));
}

let tools = loadTools();
let editingId = null;

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
const typeIcon = { script:'📄', webapp:'🌐', cli:'⌨️', api:'🔌', other:'📦' };
const typeLabel = { script:'Script', webapp:'Web App', cli:'CLI', api:'API', other:'Other' };

function renderTools() {
  const grid = document.getElementById('cards-grid');
  const filterActive = document.querySelector('.filter-btn.active').dataset.filter;
  const query = document.getElementById('search').value.toLowerCase().trim();

  const filtered = tools.filter(t => {
    const matchFilter = filterActive === 'all' || t.type === filterActive;
    const matchQ = !query || t.name.toLowerCase().includes(query) ||
      (t.desc||'').toLowerCase().includes(query) ||
      (t.tags||[]).join(' ').toLowerCase().includes(query);
    return matchFilter && matchQ;
  });

  grid.innerHTML = '';

  if (filtered.length === 0) {
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  filtered.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = t.id;

    const tagsHtml = (t.tags||[]).map(tag => `<span class="tag">${escHtml(tag)}</span>`).join('');

    let bodyHtml = '';
    if (t.code && t.code.trim()) {
      bodyHtml += `<div class="code-block" id="code-${t.id}">${escHtml(t.code)}</div>`;
    }
    if (t.url && t.url.trim()) {
      bodyHtml += `<div class="link-block">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--blue);flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <a href="${escHtml(t.url)}" target="_blank" rel="noopener">${escHtml(t.url)}</a>
      </div>`;
    }
    if (t.filepath && t.filepath.trim()) {
      bodyHtml += `<div class="link-block" style="margin-top:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <a href="file://${escHtml(t.filepath)}" title="${escHtml(t.filepath)}">${escHtml(t.filepath)}</a>
      </div>`;
    }

    let actionsHtml = '';
    if (t.code && t.code.trim()) {
      actionsHtml += `<button class="btn-sm btn-copy" onclick="copyCode('code-${t.id}',this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>`;
    }
    actionsHtml += `<button class="btn-sm btn-edit" onclick="openEdit('${t.id}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit
    </button>`;
    actionsHtml += `<button class="btn-sm btn-delete" onclick="deleteTool('${t.id}')">Delete</button>`;

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon">${t.icon || typeIcon[t.type] || '📦'}</div>
        <div class="card-meta">
          <div class="card-title">${escHtml(t.name)}</div>
          <div class="card-badges">
            <span class="badge badge-${t.type}">${typeLabel[t.type]||t.type}</span>
          </div>
        </div>
      </div>
      ${t.desc ? `<p class="card-desc">${escHtml(t.desc)}</p>` : ''}
      ${tagsHtml ? `<div class="tags">${tagsHtml}</div>` : ''}
      ${bodyHtml}
      <div class="card-actions">${actionsHtml}</div>
    `;
    grid.appendChild(card);
  });
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function copyCode(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = btn.innerHTML;
    btn.classList.add('copied');
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
  });
}

function deleteTool(id) {
  if (!confirm('Delete this tool?')) return;
  tools = tools.filter(t => t.id !== id);
  saveTools(tools);
  renderTools();
}

function openEdit(id) {
  const t = tools.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit tool';
  document.getElementById('f-name').value    = t.name || '';
  document.getElementById('f-desc').value    = t.desc || '';
  document.getElementById('f-tags').value    = (t.tags||[]).join(', ');
  document.getElementById('f-url').value     = t.url || '';
  document.getElementById('f-filepath').value = t.filepath || '';
  document.getElementById('f-code').value    = t.code || '';
  // set type radio
  const radio = document.querySelector(`input[name="type"][value="${t.type}"]`);
  if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change')); }
  openModal();
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-name').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('tool-form').reset();
  editingId = null;
  document.getElementById('modal-title').textContent = 'Add a tool';
  updateFieldVisibility();
}

document.getElementById('open-modal').addEventListener('click', () => {
  editingId = null;
  document.getElementById('tool-form').reset();
  document.getElementById('modal-title').textContent = 'Add a tool';
  updateFieldVisibility();
  openModal();
});
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('cancel-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ─────────────────────────────────────────────
//  FIELD VISIBILITY BY TYPE
// ─────────────────────────────────────────────
function updateFieldVisibility() {
  const type = document.querySelector('input[name="type"]:checked')?.value || 'script';
  const showUrl      = ['webapp','api'].includes(type);
  const showCode     = ['script','cli','other'].includes(type);
  const showFilepath = ['script','cli'].includes(type);
  document.getElementById('field-url').style.display      = showUrl      ? '' : 'none';
  document.getElementById('field-code').style.display     = showCode     ? '' : 'none';
  document.getElementById('field-filepath').style.display = showFilepath ? '' : 'none';
}

document.querySelectorAll('input[name="type"]').forEach(r => r.addEventListener('change', updateFieldVisibility));
updateFieldVisibility();

// ─────────────────────────────────────────────
//  SAVE
// ─────────────────────────────────────────────
document.getElementById('save-tool').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }

  const type     = document.querySelector('input[name="type"]:checked')?.value || 'script';
  const desc     = document.getElementById('f-desc').value.trim();
  const tagsRaw  = document.getElementById('f-tags').value.trim();
  const tags     = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
  const url      = document.getElementById('f-url').value.trim();
  const filepath = document.getElementById('f-filepath').value.trim();
  const code     = document.getElementById('f-code').value.trim();

  if (editingId) {
    const idx = tools.findIndex(t => t.id === editingId);
    if (idx !== -1) {
      tools[idx] = { ...tools[idx], name, type, desc, tags, url, filepath, code };
    }
  } else {
    tools.push({
      id: 'tool-' + Date.now(),
      name, type, desc, tags, url, filepath, code,
      icon: typeIcon[type] || '📦'
    });
  }

  saveTools(tools);
  closeModal();
  renderTools();
});

// ─────────────────────────────────────────────
//  FILTER & SEARCH
// ─────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTools();
  });
});
document.getElementById('search').addEventListener('input', renderTools);

// keyboard shortcut — Escape closes modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderTools();
</script>
</body>
</html>
